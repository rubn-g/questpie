<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="620" width="1200" height="10" fill="#B700FF"/>

  <!-- Q Symbol (new brutalist) -->
  <g transform="translate(100, 195) scale(10)">
    <path d="M10 2H2v20h8" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="square"/>
    <path d="M14 2h8v8" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="square"/>
    <rect x="13" y="13" width="10" height="10" fill="#B700FF"/>
  </g>

  <!-- Text content -->
  <text x="420" y="275" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">QUESTPIE</text>
  <text x="420" y="340" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="24" font-weight="400" fill="#ffffff" opacity="0.6">One backend. Ship everywhere.</text>

  <!-- Feature badges (brutalist, no rounded corners) -->
  <g transform="translate(420, 380)">
    <rect x="0" y="0" width="120" height="32" fill="none" stroke="#B700FF" stroke-width="1"/>
    <text x="60" y="21" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="600" fill="#B700FF" text-anchor="middle">TYPESCRIPT</text>

    <rect x="128" y="0" width="100" height="32" fill="none" stroke="#B700FF" stroke-width="1"/>
    <text x="178" y="21" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="600" fill="#B700FF" text-anchor="middle">DRIZZLE</text>

    <rect x="236" y="0" width="70" height="32" fill="none" stroke="#B700FF" stroke-width="1"/>
    <text x="271" y="21" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="600" fill="#B700FF" text-anchor="middle">ZOD</text>

    <rect x="314" y="0" width="130" height="32" fill="none" stroke="#B700FF" stroke-width="1"/>
    <text x="379" y="21" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="600" fill="#B700FF" text-anchor="middle">BETTER AUTH</text>

    <rect x="452" y="0" width="80" height="32" fill="none" stroke="#B700FF" stroke-width="1"/>
    <text x="492" y="21" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="600" fill="#B700FF" text-anchor="middle">HONO</text>
  </g>

  <!-- Tagline -->
  <text x="420" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#ffffff" opacity="0.5">Server-first TypeScript framework. MIT license.</text>

  <!-- URL -->
  <text x="420" y="530" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="500" fill="#B700FF">npx create-questpie</text>
</svg>
